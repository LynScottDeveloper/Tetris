<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0f1f;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #0f172a;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .game-shell {
        position: relative;
        width: min(100vw, 100vh * 0.6);
        height: min(100vh, 100vw * 1.6);
        max-width: 480px;
        max-height: 800px;
        border-radius: 24px;
        padding: 12px;
        background: #102249;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      canvas {
        width: 100%;
        height: 100%;
        border-radius: 18px;
        background: #e8ecf1;
        display: block;
      }

      .hint {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: rgba(15, 23, 42, 0.56);
        pointer-events: none;
        user-select: none;
      }

      @media (max-width: 600px) {
        .game-shell {
          width: 100vw;
          height: 100vh;
          max-width: none;
          max-height: none;
          border-radius: 0;
          padding: 0;
          box-shadow: none;
        }

        canvas {
          border-radius: 0;
        }

        .hint {
          bottom: 4px;
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-shell">
      <canvas id="game-canvas"></canvas>
    </div>
    <div class="hint">Use arrow keys / space / P</div>

    <script type="module" src="game/game.js"></script>
  </body>
</html>
